<text x="834.00" y="602.00" font-size="12" fill="#666666" font-family="Arial, Helvetica, sans-serif" text-anchor="start" font-weight="normal">So exp13 says the simpler story is the right one:</text>
<text x="834.00" y="624.00" font-size="12" fill="#666666" font-family="Arial, Helvetica, sans-serif" text-anchor="start" font-weight="normal">most of the gain comes from removing the relative-top filter,</text>
<text x="834.00" y="646.00" font-size="12" fill="#666666" font-family="Arial, Helvetica, sans-serif" text-anchor="start" font-weight="normal">not from switching score space by itself.</text>
