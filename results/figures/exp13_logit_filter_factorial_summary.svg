<text x="834.00" y="514.00" font-size="12" fill="#666666" font-family="Arial, Helvetica, sans-serif" text-anchor="start" font-weight="normal">On mc1 and mc3, turning the filter off helps a lot.</text>
<text x="834.00" y="536.00" font-size="12" fill="#666666" font-family="Arial, Helvetica, sans-serif" text-anchor="start" font-weight="normal">Once the filter is off, logprob and raw-logit become identical on mc1 and mc3.</text>
<text x="834.00" y="558.00" font-size="12" fill="#666666" font-family="Arial, Helvetica, sans-serif" text-anchor="start" font-weight="normal">Average no-filter effect: +0.045</text>
